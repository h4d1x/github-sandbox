name: Dynamic Downloader Workflow

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  download-and-process:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 zip
          pip install requests beautifulsoup4 m3u8

      - name: Create Python Downloader Script
        run: |
          cat << 'EOF' > downloader.py
          import json
          import os
          import time
          import requests
          import m3u8
          from urllib.parse import urljoin
          
          # تنظیمات اولیه
          DOWNLOAD_DIR = "python_downloads"
          os.makedirs(DOWNLOAD_DIR, exist_ok=True)
          
          def download_hls(m3u8_url, output_filename):
              try:
                  # این یک پیاده‌سازی ساده برای دانلود HLS است (بر اساس اسکریپت شما)
                  r = requests.get(m3u8_url, timeout=10)
                  r.raise_for_status()
                  playlist = m3u8.loads(r.text)
                  
                  with open(output_filename, 'wb') as outfile:
                      for segment in playlist.segments:
                          seg_url = urljoin(m3u8_url, segment.uri)
                          res = requests.get(seg_url, timeout=10)
                          outfile.write(res.content)
                  return True
              except Exception as e:
                  print(f"Error downloading {m3u8_url}: {e}")
                  return False

          def main():
              if not os.path.exists('tasks.json'):
                  print("No tasks.json found.")
                  return
                  
              with open('tasks.json', 'r') as f:
                  task = json.load(f)
                  
              query = task.get('search_keyword')
              max_videos = task.get('max_videos', 1) # دریافت تعداد ویدیوها
              
              print(f"Starting search for: {query}, Target videos: {max_videos}")
              downloaded_count = 0
              page = 1
              
              # حلقه تا زمانی که تعداد ویدیوهای دانلود شده به سقف برسد ادامه دارد
              while downloaded_count < max_videos:
                  print(f"Crawling page {page}...")
                  # شبیه‌سازی استخراج لینک‌ها (شما اینجا منطق دقیق سایت خود را جایگزین کنید)
                  # فرض میکنیم از جستجو یک سری آدرس m3u8 به دست می‌آید
                  # به دلیل نداشتن آدرس سایت هدف در این مکالمه، قالب کلی حفظ شده است:
                  extracted_links = [] # لیست لینک‌های استخراج شده از صفحه
                  
                  # اگر هیچ لینکی در صفحه نبود، یعنی به انتهای نتایج رسیدیم
                  if not extracted_links and page > 1: # (در نسخه واقعی شرط را بر اساس پاسخ سایت تنظیم کنید)
                      break 
                      
                  for link in extracted_links:
                      if downloaded_count >= max_videos:
                          break
                          
                      filename = os.path.join(DOWNLOAD_DIR, f"{query}_video_{downloaded_count+1}.mp4")
                      print(f"Downloading video {downloaded_count+1} of {max_videos}...")
                      
                      success = download_hls(link, filename)
                      if success:
                          downloaded_count += 1
                          time.sleep(2) # تاخیر برای جلوگیری از مسدود شدن
                          
                  page += 1
                  time.sleep(1)
                  
              print(f"Finished. Successfully downloaded {downloaded_count} videos.")

          if __name__ == "__main__":
              main()
          EOF

      - name: Extract Commands and Process Files
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          mkdir -p tmp_downloads
          
          # پردازش دستور phats
          if echo "$COMMIT_MSG" | grep -qEi "^phats\s*:\s*\[.*\]\[.*\]"; then
            PHATS_QUERY=$(echo "$COMMIT_MSG" | sed -nE 's/^phats\s*:\s*\[(.*)\]\[(.*)\].*/\1/p')
            PHATS_COUNT=$(echo "$COMMIT_MSG" | sed -nE 's/^phats\s*:\s*\[(.*)\]\[(.*)\].*/\2/p')
            
            echo "Detected phats command. Query: $PHATS_QUERY, Max Videos: $PHATS_COUNT"
            
            # تولید فایل تنظیمات برای اسکریپت پایتون (max_videos به جای max_pages)
            echo "{\"search_keyword\": \"$PHATS_QUERY\", \"max_videos\": $PHATS_COUNT, \"status\": \"pending\"}" > tasks.json
            
            # اجرای اسکریپت پایتون
            python downloader.py
            
            # انتقال فایل‌های دانلود شده توسط پایتون به پوشه موقت
            if [ -d "python_downloads" ]; then
              mv python_downloads/* tmp_downloads/ 2>/dev/null || true
            fi
            
          # پردازش دستور download (لینک مستقیم)
          elif echo "$COMMIT_MSG" | grep -qEi "^download\s*:"; then
            URLS=$(echo "$COMMIT_MSG" | sed -nE 's/^download\s*:\s*(.*)/\1/p')
            echo "Detected download command."
            cd tmp_downloads
            aria2c -x 16 -s 16 "$URLS"
            cd ..
            
          # پردازش دستور download-zip
          elif echo "$COMMIT_MSG" | grep -qEi "^download-zip\s*:"; then
            URLS=$(echo "$COMMIT_MSG" | sed -nE 's/^download-zip\s*:\s*(.*)/\1/p')
            echo "Detected download-zip command."
            cd tmp_downloads
            aria2c -x 16 -s 16 "$URLS"
            cd ..
          else
            echo "No valid download command found in commit message."
            exit 0
          fi

      - name: Zip and Split Files
        run: |
          mkdir -p final_output
          if [ "$(ls -A tmp_downloads 2>/dev/null)" ]; then
            cd tmp_downloads
            # فشرده‌سازی و تکه‌تکه کردن فایل‌ها (پارت‌های 49 مگابایتی)
            zip -r -s 49m ../final_output/downloaded_files.zip ./*
            cd ..
          else
            echo "No files were downloaded."
          fi

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add final_output/
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-downloaded and processed files"
            git push
          fi
