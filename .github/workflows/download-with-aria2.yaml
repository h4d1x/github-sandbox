name: Download from Commit & Save to Repo
on:
  push:
    branches:
      - "**"
jobs:
  process-and-save:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Parse Commit Message
        id: parse
        run: |
          MSG=$(git log -1 --pretty=%B)
          echo "Commit message: $MSG"
          
          # بررسی دستور Phats
          if echo "$MSG" | grep -qP 'phats\s*:\s*\[.*?\]\[.*?\]\[.*?\]'; then
            echo "MODE=phats" >> $GITHUB_ENV
            QUERY=$(echo "$MSG" | grep -oP 'phats\s*:\s*\[\K(.*?)(?=\]\[.*?\]\[.*?\])')
            COUNT=$(echo "$MSG" | grep -oP 'phats\s*:\s*\[.*?\]\[\K(.*?)(?=\]\[.*?\])')
            QUALITY=$(echo "$MSG" | grep -oP 'phats\s*:\s*\[.*?\]\[.*?\]\[\K(.*?)(?=\])')
            echo "PHATS_QUERY=$QUERY" >> $GITHUB_ENV
            echo "PHATS_COUNT=$COUNT" >> $GITHUB_ENV
            echo "PHATS_QUALITY=$QUALITY" >> $GITHUB_ENV
            echo "✅ Detected command: phats (Query: $QUERY, Count: $COUNT, Quality: $QUALITY)"
            
          # بررسی دستور Download Zip
          elif echo "$MSG" | grep -qP 'download-zip:'; then
            echo "MODE=zip" >> $GITHUB_ENV
            URL_LINE=$(echo "$MSG" | grep -oP 'download-zip:\s*\K.*')
            echo "URL_LINE=$URL_LINE" >> $GITHUB_ENV
            echo "✅ Detected command: download-zip"
            
          # بررسی دستور Download Normal
          elif echo "$MSG" | grep -qP 'download:'; then
            echo "MODE=normal" >> $GITHUB_ENV
            URL_LINE=$(echo "$MSG" | grep -oP 'download:\s*\K.*')
            echo "URL_LINE=$URL_LINE" >> $GITHUB_ENV
            echo "✅ Detected command: download"
            
          # اگر دستوری نبود، با موفقیت خارج شو (Exit 0) تا پروسه نامربوط ادامه پیدا نکند
          else
            echo "⏩ No download command found. Skipping gracefully."
            exit 0
          fi

      - name: Install Dependencies
        if: env.MODE != ''
        run: |
          sudo apt-get install -y aria2 zip unzip
          pip install requests

      - name: Prepare Workspace
        if: env.MODE != ''
        run: |
          mkdir -p downloads tmp_downloads

      - name: Run Phats Downloader (Python)
        if: env.MODE == 'phats'
        run: |
          cat <<EOF > tasks.json
          {
            "task_1": {
              "status": "pending",
              "query": "${{ env.PHATS_QUERY }}",
              "max_videos": ${{ env.PHATS_COUNT }},
              "max_pages": 10,
              "quality": "${{ env.PHATS_QUALITY }}"
            }
          }
          EOF

          cat << 'EOF' > downloader.py
          #!/usr/bin/env python3
          # -*- coding: utf-8 -*-
          import os, sys, re, json, time, fcntl, requests
          from urllib.parse import urljoin
          from datetime import datetime

          BASE_DIR = os.path.dirname(os.path.abspath(__file__))
          TASKS_FILE = os.path.join(BASE_DIR, 'tasks.json')
          DOWNLOADS_DIR = os.path.join(BASE_DIR, 'tmp_downloads') # مستقیم در tmp_downloads برای اسپلیت شدن
          LOG_FILE = os.path.join(BASE_DIR, 'downloader.log')
          LOCK_FILE = os.path.join(BASE_DIR, '.cron.lock')
          RAW_HTML_DIR = os.path.join(BASE_DIR, 'raw_pages')
          SAVE_ALL_SEARCH_PAGES = False

          HEADERS = {
              'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36',
              'Referer': 'https://www.pornhat.com/',
              'Accept': '*/*',
          }

          QUALITY_MAP = {'360p': 360, '480p': 480, '720p': 720, '1080p': 1080}

          def log(msg):
              timestamp = datetime.now().strftime('%Y-%m-%d %H:%M:%S')
              line = f"[{timestamp}] {msg}"
              print(line)
              try:
                  with open(LOG_FILE, 'a', encoding='utf-8') as f: f.write(line + '\n')
              except: pass

          def load_tasks():
              if not os.path.exists(TASKS_FILE): return {}
              with open(TASKS_FILE, 'r', encoding='utf-8') as f: return json.load(f)

          def save_tasks(tasks):
              with open(TASKS_FILE, 'w', encoding='utf-8') as f: json.dump(tasks, f, indent=2, ensure_ascii=False)

          def safe_filename(name):
              return re.sub(r'[^\w\-\s]', '', str(name))[:80].strip() or 'video'

          def parse_master_playlist(content, preferred_quality):
              lines = content.strip().split('\n')
              streams = []
              for i, line in enumerate(lines):
                  if line.startswith('#EXT-X-STREAM-INF:'):
                      res_match = re.search(r'RESOLUTION=(\d+)x(\d+)', line)
                      if res_match and i + 1 < len(lines):
                          height = int(res_match.group(2))
                          url = lines[i + 1].strip()
                          if url and not url.startswith('#'): streams.append({'height': height, 'url': url})
              if not streams: return None
              streams.sort(key=lambda x: x['height'])
              target = QUALITY_MAP.get(preferred_quality, 720)
              selected = streams[0]
              for s in streams:
                  if s['height'] <= target: selected = s
                  else: break
              log(f"    Selected quality: {selected['height']}p")
              return selected['url']

          def parse_variant_playlist(content, base_url):
              lines = content.strip().split('\n')
              segments = []
              for line in lines:
                  line = line.strip()
                  if line and not line.startswith('#'):
                      if line.startswith('http'): segments.append(line)
                      else: segments.append(urljoin(base_url, line))
              return segments

          def download_hls_video(m3u8_url, output_path, preferred_quality, session):
              try:
                  resp = session.get(m3u8_url, headers=HEADERS, timeout=30)
                  resp.raise_for_status()
                  master_content = resp.text
                  
                  if '#EXT-X-STREAM-INF:' in master_content:
                      variant_url = parse_master_playlist(master_content, preferred_quality)
                      if not variant_url: return False
                      if not variant_url.startswith('http'): variant_url = urljoin(m3u8_url, variant_url)
                      resp = session.get(variant_url, headers=HEADERS, timeout=30)
                      resp.raise_for_status()
                      variant_content = resp.text
                      base_url = variant_url
                  else:
                      variant_content = master_content
                      base_url = m3u8_url
                  
                  segments = parse_variant_playlist(variant_content, base_url)
                  if not segments: return False
                  
                  temp_path = output_path + '.tmp'
                  with open(temp_path, 'wb') as outfile:
                      for i, seg_url in enumerate(segments):
                          try:
                              seg_resp = session.get(seg_url, headers=HEADERS, timeout=60, stream=True)
                              seg_resp.raise_for_status()
                              for chunk in seg_resp.iter_content(chunk_size=1024*1024):
                                  if chunk: outfile.write(chunk)
                          except: continue
                  os.rename(temp_path, output_path)
                  return True
              except Exception as e:
                  if os.path.exists(output_path + '.tmp'): os.remove(output_path + '.tmp')
                  return False

          def get_video_links(query, max_pages, max_videos, session):
              videos = []
              search_base = "https://www.pornhat.com/search/{}/"
              for page in range(1, max_pages + 1):
                  if len(videos) >= max_videos: break
                  url = search_base.format(query.replace(' ', '-')) + (f"?page={page}" if page > 1 else "")
                  try:
                      resp = session.get(url, headers=HEADERS, timeout=30)
                      found = re.findall(r'<a[^>]+href="(/video/[^"]+)"', resp.text)
                      for v in found:
                          full_url = urljoin("https://www.pornhat.com", v)
                          if full_url not in videos:
                              videos.append(full_url)
                              if len(videos) >= max_videos: break
                      time.sleep(1)
                  except: break
              return videos

          def get_m3u8_url(video_url, session):
              try:
                  resp = session.get(video_url, headers=HEADERS, timeout=30)
                  match = re.search(r'(https://www\.pornhat\.com/get_file[^"\']+)', resp.text)
                  if not match: return None
                  get_file_url = match.group(1).replace('\\/', '/')
                  r = session.get(get_file_url, headers=HEADERS, timeout=30)
                  if '#EXTM3U' in r.text: return get_file_url
                  return None
              except: return None

          def get_video_title(video_url, session):
              try:
                  resp = session.get(video_url, headers=HEADERS, timeout=30)
                  match = re.search(r'<title>([^<]+)</title>', resp.text)
                  if match: return match.group(1).split(' - ')[0].strip()
                  return video_url.rstrip('/').split('/')[-1].replace('-', ' ')
              except: return f"video_{int(time.time())}"

          def process_task(task_id, task):
              max_videos = int(task.get('max_videos', 1))
              session = requests.Session()
              videos = get_video_links(task.get('query', ''), int(task.get('max_pages', 10)), max_videos, session)
              
              downloaded = 0
              quality = task.get('quality', '720p')
              
              for i, video_url in enumerate(videos):
                  if downloaded >= max_videos: break
                  title = get_video_title(video_url, session)
                  filename = safe_filename(title) + '.mp4'
                  output_path = os.path.join(DOWNLOADS_DIR, filename)
                  
                  if not os.path.exists(output_path):
                      m3u8_url = get_m3u8_url(video_url, session)
                      if m3u8_url and download_hls_video(m3u8_url, output_path, quality, session):
                          downloaded += 1
                  time.sleep(2)

          if __name__ == '__main__':
              tasks = load_tasks()
              for task_id, task in tasks.items():
                  if task.get('status') == 'pending':
                      process_task(task_id, task)
                      break
          EOF
          
          python downloader.py

      - name: Run Aria2 Downloader
        if: env.MODE == 'normal' || env.MODE == 'zip'
        run: |
          for URL in ${{ env.URL_LINE }}; do
            FILENAME=$(basename "$URL")
            echo "⬇️ Downloading $URL -> $FILENAME"
            aria2c \
              --split=2 \
              --max-connection-per-server=2 \
              --min-split-size=90M \
              --dir="tmp_downloads" \
              "$URL"
          done

          if [ "${{ env.MODE }}" = "zip" ]; then
            ARCHIVE_NAME="tmp_downloads/archive_$(date +%Y%m%d_%H%M%S).zip"
            zip -j "$ARCHIVE_NAME" tmp_downloads/*
          fi

      - name: Process & Split Files (For All Modes)
        if: env.MODE != ''
        run: |
          # Split any file over 90MB using zip native split
          for FILE in tmp_downloads/*; do
            [ -f "$FILE" ] || continue
            SIZE=$(stat -c%s "$FILE")
            LIMIT=$((90 * 1024 * 1024))
            BASENAME=$(basename "$FILE")

            if [ "$SIZE" -gt "$LIMIT" ]; then
              echo "✂️ $BASENAME is $(( SIZE / 1024 / 1024 ))MB — splitting with zip..."
              zip -s 90m "downloads/${BASENAME}.zip" -j "$FILE"
              echo "✅ Parts: $(ls downloads/${BASENAME}* | wc -l)"
            else
              cp "$FILE" "downloads/$BASENAME"
            fi
          done

          rm -rf tmp_downloads

      - name: Commit & Push
        if: env.MODE != ''
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add downloads/
          git commit -m "Add downloaded files from commit [skip ci]" || echo "Nothing to commit"
          echo "🚀 Pushing to branch: $BRANCH"
          git push origin HEAD:$BRANCH
