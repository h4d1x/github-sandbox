name: Download from Commit & Save to Repo
on:
  push:
    branches:
      - "**"
jobs:
  save-file:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Dependencies (aria2, yt-dlp)
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 zip unzip jq
          # نصب آخرین نسخه yt-dlp برای پشتیبانی کامل از سایت‌ها و سرچ
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp

      - name: Extract URLs/Commands and Process Files
        run: |
          set -e # توقف اسکریپت در صورت بروز خطای بحرانی
          
          MSG=$(git log -1 --pretty=%B)
          echo "Commit message: $MSG"

          mkdir -p downloads tmp_downloads

          # 1. بررسی دستور جدید phats : [query][count]
          if echo "$MSG" | grep -qP 'phats\s*:\s*\[.*?\]\[\d+\]'; then
            MODE="zip" # فایل‌های سرچ شده در نهایت زیپ می‌شوند
            QUERY=$(echo "$MSG" | grep -oP 'phats\s*:\s*\[\K(.*?)(?=\]\[)')
            COUNT=$(echo "$MSG" | grep -oP 'phats\s*:\s*\[.*?\]\[\K(\d+)(?=\])')

            if [ -z "$QUERY" ] || [ -z "$COUNT" ]; then
              echo "❌ Error: Could not parse search query or count."
              exit 1
            fi

            echo "🔍 Command: PHATS Search"
            echo "🔎 Query: $QUERY | 🔢 Count: $COUNT"

            # استفاده از yt-dlp برای سرچ و دانلود فایل‌ها
            # پیشوند phsearch برای سرچ مستقیم استفاده شده است
            yt-dlp "phsearch${COUNT}:${QUERY}" \
              -o "tmp_downloads/%(title)s.%(ext)s" \
              --max-downloads "$COUNT" \
              --restrict-filenames \
              || echo "⚠️ Some downloads may have failed, proceeding with what we have."

            # بررسی اینکه آیا فایلی دانلود شده است یا خیر
            if [ -z "$(ls -A tmp_downloads)" ]; then
               echo "❌ Error: No files were found or downloaded for this search."
               exit 1
            fi

          # 2. بررسی دستور قدیمی download-zip:
          elif echo "$MSG" | grep -qP 'download-zip:'; then
            MODE="zip"
            URL_LINE=$(echo "$MSG" | grep -oP 'download-zip:\s*\K.*')
            
            if [ -z "$URL_LINE" ]; then
              echo "❌ Error: Empty URL list for download-zip."
              exit 1
            fi

            for URL in $URL_LINE; do
              echo "⬇️ Downloading $URL"
              aria2c --split=2 --max-connection-per-server=2 --min-split-size=90M --dir="tmp_downloads" "$URL" || echo "⚠️ Failed to download $URL"
            done

          # 3. بررسی دستور قدیمی download:
          elif echo "$MSG" | grep -qP 'download:'; then
            MODE="normal"
            URL_LINE=$(echo "$MSG" | grep -oP 'download:\s*\K.*')
            
            if [ -z "$URL_LINE" ]; then
              echo "❌ Error: Empty URL list for download."
              exit 1
            fi

            for URL in $URL_LINE; do
              echo "⬇️ Downloading $URL"
              aria2c --split=2 --max-connection-per-server=2 --min-split-size=90M --dir="tmp_downloads" "$URL" || echo "⚠️ Failed to download $URL"
            done

          # اگر هیچ دستوری یافت نشد
          else
            echo "⏭️ No valid download/search command found in commit message. Skipping."
            exit 0 # خروج موفقیت آمیز تا اکشن قرمز نشود
          fi

          echo "⚙️ Processing files... Mode: $MODE"

          # اگر فایلی در tmp_downloads نبود کلا خارج شو
          if [ -z "$(ls -A tmp_downloads 2>/dev/null)" ]; then
            echo "❌ No files exist in tmp_downloads. Aborting."
            exit 1
          fi

          # زیپ کردن فایل ها در صورت نیاز
          if [ "$MODE" = "zip" ]; then
            ARCHIVE_NAME="tmp_downloads/archive_$(date +%Y%m%d_%H%M%S).zip"
            echo "📦 Zipping downloaded files to $ARCHIVE_NAME"
            zip -j "$ARCHIVE_NAME" tmp_downloads/* || { echo "❌ Zipping failed"; exit 1; }
            # پاک کردن فایل‌های اصلی پس از زیپ برای جلوگیری از حجم اضافه
            find tmp_downloads -type f ! -name '*.zip' -delete
          fi

          # تکه تکه کردن فایل‌های بزرگتر از 90 مگابایت
          for FILE in tmp_downloads/*; do
            [ -f "$FILE" ] || continue
            SIZE=$(stat -c%s "$FILE")
            LIMIT=$((90 * 1024 * 1024))
            BASENAME=$(basename "$FILE")

            if [ "$SIZE" -gt "$LIMIT" ]; then
              echo "✂️ $BASENAME is $(( SIZE / 1024 / 1024 ))MB — splitting with zip..."
              zip -s 90m "downloads/${BASENAME}.zip" -j "$FILE" || { echo "❌ Splitting failed for $BASENAME"; exit 1; }
              echo "✅ Parts: $(ls downloads/${BASENAME}* | wc -l)"
            else
              cp "$FILE" "downloads/$BASENAME"
            fi
          done

          rm -rf tmp_downloads

      - name: Commit & Push
        run: |
          # اگر پوشه downloads خالی بود کامیت نکن
          if [ -z "$(ls -A downloads 2>/dev/null)" ]; then
            echo "⏭️ No final files to commit. Skipping."
            exit 0
          fi
          
          BRANCH="${GITHUB_REF_NAME}"
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add downloads/
          git commit -m "Add downloaded files from commit [skip ci]" || echo "Nothing to commit"
          echo "🚀 Pushing to branch: $BRANCH"
          git push origin HEAD:$BRANCH
